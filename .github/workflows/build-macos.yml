name: Build macOS

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture"
        required: true
        type: choice
        options:
          - arm64
          - x64
          - both
        default: arm64
      branch:
        description: "Branch to build (defaults to the branch you run from)"
        required: false
        type: string

jobs:
  build-arm64:
    if: ${{ inputs.arch == 'arm64' || inputs.arch == 'both' }}
    name: macOS arm64 (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 60
    env:
      VSCODE_ARCH: arm64
      NPM_ARCH: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        run: python3 -m pip install --break-system-packages setuptools

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: .build/node_modules_cache
          key: node_modules-macos-arm64-${{ hashFiles('package-lock.json') }}

      - name: Extract node_modules cache
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: tar -xzf .build/node_modules_cache/cache.tgz

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          set -e
          for i in {1..3}; do
            npm ci && break
            if [ $i -eq 3 ]; then echo "npm ci failed" >&2; exit 1; fi
            echo "Retry $i..."
          done
        env:
          npm_config_arch: arm64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_DEFINES: "kerberos_use_rtld=false"

      - name: Create node_modules cache
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          set -e
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -p .build/node_modules_cache
          tar -czf .build/node_modules_cache/cache.tgz --files-from .build/node_modules_list.txt

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build client (minified)
        run: npm run gulp vscode-darwin-arm64-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package .zip
        run: |
          set -e
          cd ../VSCode-darwin-arm64
          APP_NAME="$(ls | head -n 1)"
          zip -Xry "$GITHUB_WORKSPACE/.build/NexgileCode-darwin-arm64.zip" "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexgileCode-darwin-arm64
          path: .build/NexgileCode-darwin-arm64.zip
          retention-days: 30

  build-x64:
    if: ${{ inputs.arch == 'x64' || inputs.arch == 'both' }}
    name: macOS x64 (Intel)
    runs-on: macos-13
    timeout-minutes: 60
    env:
      VSCODE_ARCH: x64
      NPM_ARCH: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Python
        run: python3 -m pip install --break-system-packages setuptools

      - name: Restore node_modules cache
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: .build/node_modules_cache
          key: node_modules-macos-x64-${{ hashFiles('package-lock.json') }}

      - name: Extract node_modules cache
        if: steps.cache-node-modules.outputs.cache-hit == 'true'
        run: tar -xzf .build/node_modules_cache/cache.tgz

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          set -e
          for i in {1..3}; do
            npm ci && break
            if [ $i -eq 3 ]; then echo "npm ci failed" >&2; exit 1; fi
            echo "Retry $i..."
          done
        env:
          npm_config_arch: x64
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GYP_DEFINES: "kerberos_use_rtld=false"

      - name: Create node_modules cache
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          set -e
          node build/azure-pipelines/common/listNodeModules.ts .build/node_modules_list.txt
          mkdir -p .build/node_modules_cache
          tar -czf .build/node_modules_cache/cache.tgz --files-from .build/node_modules_list.txt

      - name: Download built-in extensions
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build client (minified)
        run: npm run gulp vscode-darwin-x64-min
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package .zip
        run: |
          set -e
          cd ../VSCode-darwin-x64
          APP_NAME="$(ls | head -n 1)"
          zip -Xry "$GITHUB_WORKSPACE/.build/NexgileCode-darwin-x64.zip" "$APP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexgileCode-darwin-x64
          path: .build/NexgileCode-darwin-x64.zip
          retention-days: 30
